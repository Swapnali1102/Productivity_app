{% extends "base.html" %}

{% block title %}Manage Categories{% endblock %}

{% block content %}
<div class="categories-page">
    <div class="page-header">
        <h2><i class="fas fa-tags"></i> Manage Expense Categories</h2>
        <a href="{{ url_for('expenses.expenses') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="categories-container">
        <div class="card add-category-card">
            <h3><i class="fas fa-plus"></i> Add New Category</h3>
            <form method="POST" action="{{ url_for('expenses.add_category') }}">
                <div class="form-group">
                    <label for="name">Category Name:</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Shopping" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Add Category
                </button>
            </form>
        </div>

        <div class="card categories-list-card">
            <h3><i class="fas fa-list"></i> Existing Categories</h3>
            <div class="categories-grid">
                {% for category in categories %}
                <div class="category-item">
                    <span class="category-name">{{ category.name }}</span>
                    <a href="{{ url_for('expenses.delete_category', category_id=category.id) }}" 
                       class="btn-icon delete" onclick="return confirm('Delete this category? All expenses under this category will be deleted.')">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<style>
.categories-page { max-width: 800px; margin: 0 auto; }
.categories-container { display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem; }
.categories-grid { display: grid; gap: 0.5rem; }
.category-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #f7fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
.category-name { font-weight: 600; color: #2d3748; }
.btn-icon.delete { color: #e53e3e; cursor: pointer; }
@media (max-width: 768px) {
    .categories-container { grid-template-columns: 1fr; }
}
</style>
{% endblock %}
